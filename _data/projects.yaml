- title: Building Endangered Language Technology (BELT)
  subtitle: Learning to create language tools without prior experience  
  image: images/photo.jpg
  link: https://belt.rc.colorado.edu
  description: BELT is a highly interactive course for creating low-resource language technology with no prior programming experience. The goal of BELT is to make it easy to build and deploy usable, real-world tools for speakers within endangered language communities. BELT is available as an online platform and occasionally an in-person workshop, the most recent of which was January 2024 in Santiago, Chile.
